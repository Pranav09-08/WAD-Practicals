<h2>Register</h2>

<form #f="ngForm" (ngSubmit)="register(f.value)">
  <label>Username:</label><br>
  <input type="text" name="username" ngModel required><br><br>

  <label>Email:</label><br>
  <input type="email" name="email" ngModel required><br><br>

  <label>Password:</label><br>
  <input type="password" name="password" ngModel required><br><br>

  <button type="submit">Register</button>
</form>
