<h2>Login</h2>

<form #f="ngForm" (ngSubmit)="login(f.value)">
  <label>Username:</label><br>
  <input type="text" name="username" ngModel required><br><br>

  <label>Password:</label><br>
  <input type="password" name="password" ngModel required><br><br>

  <button type="submit">Login</button>
</form>
