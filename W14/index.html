<!DOCTYPE html>
<html>
<head>
    <title>User List</title>
</head>
<body>

<h2>Users</h2>
<ul id="list"></ul>

<script>
fetch("http://localhost:4001/users")
.then(res => res.json())
.then(data => {
    let list = document.getElementById("list");
    data.forEach(user => {
        list.innerHTML += `<li>${user.name} - ${user.email}</li>`;
    });
});
</script>

</body>
</html>
