<!DOCTYPE html>
<html>
<head>
    <title>Users</title>
</head>
<body>

<h2>Registered Users</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Mobile</th>
        <th>City</th>
    </tr>
    <tbody id="data"></tbody>
</table>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];

users.forEach(u => {
    document.getElementById("data").innerHTML += `
        <tr>
            <td>${u.name}</td>
            <td>${u.email}</td>
            <td>${u.mobile}</td>
            <td>${u.city}</td>
        </tr>
    `;
});
</script>

</body>
</html>
