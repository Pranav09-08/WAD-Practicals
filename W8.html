<!DOCTYPE html>
<html>

<head>
    <title>Event Registration</title>
    <meta name="    viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }

        .form-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
    </style>

</head>

<body>
    <div class="container">
        <div class="form-container">
            <h2 class="text-center mb-4">Event Registration</h2>

            <form class="needs-validation" novalidate>

                <!--Name-->
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="name" placeholder="Name" required   data-bs-toggle="tooltip" title="Enter your full name">
                    <label for="name">Full Name :</label>
                    <div class="invalid-feedback">Name is required</div>
                </div>

                <!--Email-->
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" placeholder="Email" required data-bs-toggle="tooltip" title="Enter your Email address">
                    <label for="email">Email :</label>
                    <div class="invalid-feedback">Email is required</div>
                </div>

                <!--Phone-->
                <div class="form-floating mb-3">
                    <input type="tel" class="form-control" id="phone" placeholder="Phone" required data-bs-toggle="tooltip" title="Enter your Phone Number">
                    <label for="phone">Phone Number :</label>
                    <div class="invalid-feedback">Phone Number is required</div>
                </div>

                <!--Evemt Type-->
                <div class="mb-3">
                    <label class="form-label">Select Event</label>
                    <select class="form-select" required>
                        <option value="">Choose..</option>
                        <option value="workshop">Workshop</option>
                        <option value="seminar">Seminar</option>
                        <option value="hackathon">Hackathon</option>
                    </select>
                    <div class="invalid-feedback">Please select the event</div>
                </div>

                <button class="btn btn-primary w-100" type="submit">Register</button>

            </form>
        </div>
    </div>

    <!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
    tooltipTriggerList.forEach(el => new bootstrap.Tooltip(el));

    (()=>{
        'use strict'
        const forms = document.querySelectorAll('.needs-validation')

        Array.from(forms).forEach(form =>{
            form.addEventListener('submit',event=>{
                if(!form.checkValidity()){
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            },false)
        })
    })();

</script>

</body>

</html>
