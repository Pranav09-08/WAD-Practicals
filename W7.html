<!DOCTYPE html>
<html>
<head>
    <title>Facebook Clone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f0f2f5; }
        .fb-header {
            background-color: #1877f2;
            color: white;
            padding: 10px;
        }
        .fb-header input {
            margin-right: 5px;
        }
        .signup-box {
            background: white;
            padding: 20px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<!-- 🔹 Top Navbar -->
<div class="fb-header d-flex justify-content-between align-items-center">
    <h2 class="ms-3">facebook</h2>
        
    <div class="me-3 d-flex">
        <input type="text" placeholder="Email" class="form-control me-2">
        <input type="password" placeholder="Password" class="form-control me-2">
        <button class="btn btn-light">Login</button>
    </div>
</div>

<!-- 🔹 Main Section -->
<div class="container mt-5">
    <div class="row">

        <!-- Left Side -->
        <div class="col-md-6">
            <h3>Facebook helps you connect and share with people.</h3>
            <img src="https://via.placeholder.com/400" class="img-fluid mt-3">
        </div>

        <!-- Right Side -->
        <div class="col-md-6">
            <div class="signup-box">
                <h2>Create an Account</h2>
                <p>It’s free and always will be.</p>

                <div class="row">
                    <div class="col">
                        <input type="text" class="form-control mb-2" placeholder="First Name">
                    </div>
                    <div class="col">
                        <input type="text" class="form-control mb-2" placeholder="Last Name">
                    </div>
                </div>

                <input type="email" class="form-control mb-2" placeholder="Email">
                <input type="email" class="form-control mb-2" placeholder="Re-enter Email">
                <input type="password" class="form-control mb-2" placeholder="Password">

                <input type="date" class="form-control mb-2">

                <div class="mb-2">
                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female
                </div>

                <button class="btn btn-success w-100">Sign Up</button>
            </div>
        </div>

    </div>
</div>

</body>
</html>
